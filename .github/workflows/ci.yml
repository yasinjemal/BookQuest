name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, build & test (with Postgres)
    runs-on: ubuntu-latest

    # A throwaway Postgres so the database integration tests run for real. It is
    # recreated every run, so the tests may reset it freely (the upgrade test even
    # drops and recreates `public`).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bookquest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Reachable during build (lib/pg requires DATABASE_URL at import) and used by
      # the integration tests. Local Postgres needs no SSL.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/bookquest_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/bookquest_test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: node scripts/migrate.mjs

      - name: Test (unit + database integration)
        run: npm test

      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client-16

      - name: Create disposable restore database
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "CREATE DATABASE bookquest_restore_drill"

      - name: Prove logical backup restoration
        env:
          BACKUP_RESTORE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/bookquest_restore_drill
        run: >-
          npm run backup:drill --
          --confirm-reset=bookquest_restore_drill
          --artifact=${{ runner.temp }}/bookquest-ci.dump
